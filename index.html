<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Ofertas - Supermercado</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        padding: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        margin: 0;
      }

      @media (min-width: 768px) {
        body {
          flex-direction: row;
          align-items: flex-start;
          justify-content: center;
          padding: 40px;
        }
      }

      .controles {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        box-sizing: border-box;
        max-height: 90vh; /* Para não vazar na tela se tiver muitos campos */
        overflow-y: auto; /* Adiciona rolagem se a tela for pequena */
      }

      .controles h2,
      .preview h2 {
        margin-top: 0;
        text-align: center;
        color: #333;
      }
      .controles h3 {
        margin-top: 25px;
        margin-bottom: 5px;
        font-size: 16px;
        color: #e74c3c;
        border-bottom: 1px solid #eee;
        padding-bottom: 5px;
      }
      .controles label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
        color: #555;
        font-size: 14px;
      }
      .controles input[type="text"],
      .controles input[type="file"] {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 15px;
      }
      .controles input[type="color"] {
        width: 100%;
        height: 40px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
        cursor: pointer;
        padding: 0;
      }

      button {
        background-color: #e74c3c;
        color: white;
        border: none;
        padding: 15px;
        margin-top: 25px;
        width: 100%;
        font-size: 16px;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background-color: #c0392b;
      }

      .preview {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 500px;
      }

      #imagemFinal {
        background: #fff;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 100%;
        height: auto;
        aspect-ratio: 1 / 1;
        display: block;
      }

      .dica-ios {
        margin-top: 15px;
        font-size: 14px;
        color: #666;
        text-align: center;
        background-color: #e8f4fd;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #bae0ff;
        width: 100%;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="controles">
      <h2>Criar Oferta</h2>

      <h3>Dados da Loja</h3>
      <label for="nomeMercado">Nome do Mercado:</label>
      <input
        type="text"
        id="nomeMercado"
        placeholder="Ex: Supermercado Preço Bom"
        oninput="desenharArte()"
      />

      <label for="enderecoMercado">Endereço:</label>
      <input
        type="text"
        id="enderecoMercado"
        placeholder="Ex: Rua das Flores, 123 - Centro"
        oninput="desenharArte()"
      />

      <label for="contatoMercado">Telefone / WhatsApp:</label>
      <input
        type="text"
        id="contatoMercado"
        placeholder="Ex: (11) 99999-9999"
        oninput="desenharArte()"
      />

      <label for="corFundo">Cor do Fundo da Arte:</label>
      <input
        type="color"
        id="corFundo"
        value="#ffcc00"
        oninput="desenharArte()"
      />

      <h3>Dados do Produto</h3>
      <label for="produtoNome">Nome do Produto:</label>
      <input
        type="text"
        id="produtoNome"
        placeholder="Ex: Arroz Branco 5kg"
        oninput="desenharArte()"
      />

      <label for="produtoPreco">Preço (R$):</label>
      <input
        type="text"
        id="produtoPreco"
        placeholder="Ex: 24,99"
        oninput="desenharArte()"
      />

      <label for="dataValidade">Validade da Oferta:</label>
      <input
        type="text"
        id="dataValidade"
        placeholder="Ex: Válido até 30/10"
        oninput="desenharArte()"
      />

      <label for="imagemProduto">Foto do Produto:</label>
      <input
        type="file"
        id="imagemProduto"
        accept="image/*"
        onchange="carregarImagem(event)"
      />

      <button onclick="baixarImagem()">Baixar Imagem</button>
    </div>

    <div class="preview">
      <h2>Pré-visualização</h2>
      <img id="imagemFinal" alt="Sua oferta aparecerá aqui" src="" />
      <div class="dica-ios">
        <strong>Como salvar no iPhone:</strong><br />
        Pressione e segure o dedo na imagem acima e escolha
        <b>"Salvar em Fotos"</b>.
      </div>
    </div>

    <script>
      const canvas = document.createElement("canvas");
      canvas.width = 1080;
      canvas.height = 1080;
      const ctx = canvas.getContext("2d");

      const imgFinal = document.getElementById("imagemFinal");
      let imagemCarregada = null;

      function desenharArte() {
        // Pegar valores dos campos
        const mercado =
          document.getElementById("nomeMercado").value || "NOME DO MERCADO";
        const endereco = document.getElementById("enderecoMercado").value; // Opcional, sem padrão
        const contato = document.getElementById("contatoMercado").value; // Opcional, sem padrão
        const corFundoSelecionada = document.getElementById("corFundo").value;
        const nome =
          document.getElementById("produtoNome").value || "NOME DO PRODUTO";
        const preco = document.getElementById("produtoPreco").value || "0,00";
        const validade =
          document.getElementById("dataValidade").value || "Válido até DD/MM";

        // Limpa o canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Fundo colorido
        ctx.fillStyle = corFundoSelecionada;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Círculo SUAVIZADO (Radial Gradient)
        const cx = canvas.width / 2;
        const cy = canvas.height / 2 - 80; // Subi o círculo um pouquinho para dar mais espaço no rodapé
        const radius = 420;

        const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
        gradient.addColorStop(0, "#ffffff");
        gradient.addColorStop(0.8, "#ffffff");
        gradient.addColorStop(1, "rgba(255, 255, 255, 0)");

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fill();

        // 3. Imagem do produto
        if (imagemCarregada) {
          const tamanhoImg = 530;
          const x = (canvas.width - tamanhoImg) / 2;
          const y = cy - tamanhoImg / 2 - 20;

          ctx.save();
          ctx.shadowColor = "rgba(0, 0, 0, 0.3)";
          ctx.shadowBlur = 20;
          ctx.shadowOffsetX = 0;
          ctx.shadowOffsetY = 15;
          ctx.drawImage(imagemCarregada, x, y, tamanhoImg, tamanhoImg);
          ctx.restore();
        }

        // 4. Nome do Mercado
        ctx.fillStyle = "#333333";
        ctx.font = "bold 35px Arial";
        ctx.textAlign = "left";
        ctx.fillText(mercado.toUpperCase(), 40, 60);

        // 5. Nome do Produto
        ctx.fillStyle = "#333333";
        ctx.font = "bold 75px Arial";
        ctx.textAlign = "center";
        ctx.fillText(nome.toUpperCase(), canvas.width / 2, 140);

        // 6. Tarja Vermelha (Subi um pouco e diminuí ligeiramente a altura)
        ctx.fillStyle = "#e74c3c";
        ctx.fillRect(0, canvas.height - 380, canvas.width, 180);

        // 7. Preço
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 140px Arial";
        ctx.fillText("R$ " + preco, canvas.width / 2, canvas.height - 250);

        // --- SEÇÃO DE RODAPÉ ---

        // 8. Validade (Fica logo abaixo da tarja vermelha)
        ctx.fillStyle = "#333333";
        ctx.font = "bold 32px Arial";
        ctx.fillText(validade, canvas.width / 2, canvas.height - 140);

        // 9. Endereço
        if (endereco) {
          ctx.font = "28px Arial";
          ctx.fillText(endereco, canvas.width / 2, canvas.height - 90);
        }

        // 10. Contato
        if (contato) {
          ctx.font = "bold 28px Arial";
          // Adiciona um ícone de telefone antes do número
          ctx.fillText("📞 " + contato, canvas.width / 2, canvas.height - 40);
        }

        // Passa a arte finalizada para a tela
        imgFinal.src = canvas.toDataURL("image/png");
      }

      function carregarImagem(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
          const img = new Image();
          img.onload = function () {
            imagemCarregada = img;
            desenharArte();
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      function baixarImagem() {
        const link = document.createElement("a");
        link.download = "oferta-supermercado.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      }

      window.onload = desenharArte;
    </script>
  </body>
</html>
